name: zqksk

services:
  # ============================================
  # 1. Jenkins - CI/CD Server
  # ============================================
  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    container_name: zqksk-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    environment:
      - TZ=Asia/Seoul
    networks:
      - zqksk-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 512M

  # ============================================
  # 2. MariaDB - Database
  # ============================================
  mariadb:
    image: mariadb:11
    container_name: zqksk-mariadb
    restart: unless-stopped
    ports:
      - "3310:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d
    environment:
      - TZ=Asia/Seoul
      - MARIADB_ROOT_PASSWORD=root1234!
      - MARIADB_DATABASE=ldk
      - MARIADB_USER=ldk
      - MARIADB_PASSWORD=1q2w3e!Q@W#E
    networks:
      - zqksk-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # 3. Eureka - Discovery Service
  # ============================================
  discovery:
    build:
      context: .
      dockerfile: docker/discovery/Dockerfile
    container_name: zqksk-discovery
    restart: unless-stopped
    ports:
      - "7001:7001"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - zqksk-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-sf", "-o", "/dev/null", "http://localhost:7001/"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # 4. Auth Service
  # ============================================
  auth:
    build:
      context: .
      dockerfile: docker/auth/Dockerfile
    container_name: zqksk-auth
    restart: unless-stopped
    ports:
      - "7002:7002"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_SCHEMA=ldk
      - DB_USERNAME=ldk
      - DB_PASSWORD=1q2w3e!Q@W#E
    depends_on:
      mariadb:
        condition: service_healthy
      discovery:
        condition: service_healthy
    networks:
      - zqksk-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================
  # 5. Stock API Service
  # ============================================
  # 탑500 크론: key.env 또는 .env 에 GEMINI_API_KEY, KIS_APP_KEY, KIS_APP_SECRET 설정.
  # data 볼륨: top500-codes.txt 읽기 + top500-*-analysis.json 저장용.
  stock:
    build:
      context: .
      dockerfile: docker/stock/Dockerfile
    container_name: zqksk-stock
    restart: unless-stopped
    ports:
      - "7005:7005"
    env_file:
      - key.env
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      discovery:
        condition: service_healthy
    networks:
      - zqksk-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # 6. Gateway Service
  # ============================================
  gateway:
    build:
      context: .
      dockerfile: docker/gateway/Dockerfile
    container_name: zqksk-gateway
    restart: unless-stopped
    ports:
      - "7003:7003"
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      discovery:
        condition: service_healthy
    networks:
      - zqksk-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

networks:
  zqksk-network:
    driver: bridge

volumes:
  jenkins_home:
  mariadb_data:

